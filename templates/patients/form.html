{% extends "base.html" %}

{% block content %}
<h2 class="mb-3">Add / Edit Patient</h2>

<form method="post" class="card p-4 shadow-sm">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">Save Patient</button>
    <a href="{% url 'patients:list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
