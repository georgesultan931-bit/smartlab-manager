{% extends "base.html" %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h2 class="text-danger">Confirm Delete</h2>

        <p>Are you sure you want to delete this patient?</p>

        <p>
            <strong>{{ patient.full_name }}</strong><br>
            Patient No: {{ patient.patient_number }}
        </p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'patients:detail' patient.pk %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
