{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm col-lg-8 mx-auto">
    <div class="card-body p-4">
        <h1 class="h3 mb-4">{{ title }}</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary">Save</button>
            <a class="btn btn-outline-secondary" href="{% url 'tests:list' %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
