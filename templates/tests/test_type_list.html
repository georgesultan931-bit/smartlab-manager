{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Test Types</h1>
    <a class="btn btn-primary" href="{% url 'tests:type_create' %}">New Test Type</a>
</div>
<div class="card shadow-sm">
    <div class="table-responsive">
        <table class="table mb-0">
            <thead><tr><th>Name</th><th>Normal Range</th><th>Price</th></tr></thead>
            <tbody>
                {% for item in test_types %}
                <tr><td>{{ item.name }}</td><td>{{ item.normal_range|default:'-' }}</td><td>{{ item.price }}</td></tr>
                {% empty %}
                <tr><td colspan="3" class="text-center text-muted py-4">No test types found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
